name: Update Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write
    steps:
      - name: Metrics - Base
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config_timezone: America/Sao_Paulo
          base: header
          filename: metrics.svg
          repositories_skipped:
          committer_message: "daily asset update: metrics"
